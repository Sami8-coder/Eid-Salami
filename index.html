<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Eid Salami AI 😈</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<meta property="og:title" content="Eid Salami AI 😈">
<meta property="og:description" content="জানুন আপনার ঈদ সালামি কত! 😍">
<meta property="og:image" content="https://your-site.com/preview.png">
<meta property="og:url" content="https://your-site.com">
<meta property="og:type" content="website">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#020617;
  color:white;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:linear-gradient(45deg,#3b82f6,#9333ea,#06b6d4);
  animation:move 10s linear infinite;
  filter:blur(120px);
  opacity:.4;
}

@keyframes move{
  0%{transform:translate(-20%,-20%)}
  50%{transform:translate(-10%,-30%)}
  100%{transform:translate(-20%,-20%)}
}

.card{
  width:380px;
  padding:30px;
  border-radius:25px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  text-align:center;
  z-index:1;
}

input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
}

button{
  background:linear-gradient(135deg,gold,orange);
  cursor:pointer;
}

.hidden{display:none}

.loader{
  margin-top:20px;
  font-size:18px;
}

.amount{
  font-size:40px;
  margin:15px 0;
  background:linear-gradient(90deg,gold,orange);
  -webkit-background-clip:text;
  color:transparent;
}

.confetti{
  position:absolute;
  width:10px;
  height:10px;
  animation:fall 3s linear infinite;
}

@keyframes fall{
  to{transform:translateY(100vh) rotate(360deg)}
}
</style>

</head>

<body>

<div class="card">

<h2>🎉 Eid Salami AI🎉 </h2>
<h2>From Mohammad Sami</h2>

<input id="name" placeholder="তোমার নাম লিখো">

<button onclick="start()">Start</button>

<button onclick="shareResult()">📤 Share</button>

<div id="loading" class="hidden loader">
  🤖 হিসাব করা হচ্ছে...
</div>

<div id="result" class="hidden">
  <h3 id="text"></h3>
  <div class="amount" id="amount"></div>
</div>

</div>

<script>

// START
function start(){
  let name = document.getElementById("name").value;
  if(!name) return alert("নাম দাও 😒");

  document.getElementById("loading").classList.remove("hidden");

  setTimeout(()=>{
    document.getElementById("loading").classList.add("hidden");
    showResult(name);
  },2000);
}


// SHOW RESULT
function showResult(name){
  let chance = Math.random();

  let random;
  if(chance < .3){
    random = 0;
  } else {
    random = (Math.random() * 2.99).toFixed(2);
  }

  let msg = "";

  if(random == 0){
    msg = "💀 তুমি বেশি লোভী!";
  }
  else if(random <.5 ){
    msg = "😭 থাক কষ্ট পেয়ো না";
  }
  else if(random <.7 ){
    msg = "এতো টাকা দিয়ে কি করবা?";
  }
  else if(random <.9 ){
    msg = "😭 খুশি তো?";
  }
  else if(random <1.1 ){
    msg = " এইটা দিয়ে একখান মারসিটিজ কিনো";
  }
  else if(random < 1.3){
    msg = "😂 মুড়ি খাও";
  }
  else if(random < 1.5){
    msg = "😂 বাতাসা খেও";
  }
  else if(random < 1.7){
    msg = "😂 আরেহ!বড়লোক্স";
  }
  else if(random < 1.9){
    msg = "😂 ভালো হয়ে যাও মাসুদ";
  }
  else if(random < 2.1){
    msg = "😂 গরিবের বিল গেটস";
  }
  else if(random < 2.3){
    msg = "😂 গরিবের জাকারবারগ";
  }
  else if(random < 2.5){
    msg = "😏 চলবে";
  }
  else if(random < 2.7){
    msg = "🔥 বড়লোক vibes detected!";
  }
  else if(random < 2.9){
    msg = "👑 তুমি তো king!";
  }
  else if(random < 2.96){
    msg = "😏 আরেহ!ইলন মাস্ক যে";
  }
  else if(random < 2.98){
    msg = "⚠️ AI বলছে: বিশ্বাসযোগ্য না";
  }
  else{
    msg = "AI confused: এটা সালামি না স্বপ্ন?";
  }

  let finalText = name + ", তোমার সালামি 😈";
  let finalAmount = "৳ " + random + " " + msg;

  document.getElementById("result").classList.remove("hidden");
  document.getElementById("text").innerText = finalText;
  document.getElementById("amount").innerText = finalAmount;

  window.lastResult = finalText + " - " + finalAmount;

  spinEffect();
  launchConfetti();
}


// SPIN
function spinEffect(){
  let el = document.getElementById("amount");

  el.style.transition = "transform 0.6s ease";
  el.style.transform = "rotate(360deg) scale(1.3)";

  setTimeout(()=>{
    el.style.transform = "rotate(0deg) scale(1)";
  },600);
}


// CONFETTI
function launchConfetti(){
  for(let i=0;i<40;i++){
    let div = document.createElement("div");
    div.className = "confetti";
    div.style.left = Math.random()*100 + "vw";
    div.style.background = `hsl(${Math.random()*360},100%,50%)`;
    div.style.animationDuration = (Math.random()*2+2)+"s";
    document.body.appendChild(div);
  }
}


// SHARE
function shareResult(){
  if(!window.lastResult){
    alert("আগে result generate করো!");
    return;
  }

  if(navigator.share){
    navigator.share({
      title:"Eid Salami AI",
      text:window.lastResult,
      url:window.location.href
    });
  } else {
    navigator.clipboard.writeText(window.lastResult);
    alert("📋 Copy হয়েছে!");
  }
}

</script>

</body>
</html>
